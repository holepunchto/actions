name: Keet Automation

inputs:
  GITHUB_TOKEN:
    type: string
    description: "from secrets.GITHUB"
    required: true
  seed:
    type: string
    description: "seed for the automation"
    required: true
  remote:
    type: string
    description: "remote key for the automation"
    required: true
  job:
    type: string
    description: "job to run"
    required: true
  commit:
    type: string
    description: "commit"
    required: false
  channel:
    type: string
    description: "channel"
    required: false
  dir:
    type: string
    description: "dir"
    required: false
  artifact:
    type: string
    description: "artifact to download"
    required: false
  skip-install:
    type: string
    description: "skip install step"
    required: false
  notify:
    type: string
    description: 'notify'
    required: false
    default: 'true'
  dry-run:
    type: string
    description: 'dry run'
    required: false

runs:
  using: composite
  steps:
    - name: Install keet-automation
      env:
        NODE_AUTH_TOKEN: ${{ inputs.GITHUB_TOKEN }}
      shell: bash
      run: |
        npm install -g @holepunchto/keet-automation

    - name: Build
      env:
        COMMIT: ${{ inputs.commit }}
        CHANNEL: ${{ inputs.channel }}
        DIR: ${{ inputs.dir }}
        ARTIFACT: ${{ inputs.artifact }}
        SEED: ${{ inputs.seed }}
        REMOTE: ${{ inputs.remote }}
        JOB: ${{ inputs.job }}
        SKIP_INSTALL: ${{ inputs.skip-install }}
        NOTIFY: ${{ inputs.notify }}
        DRY_RUN: ${{ inputs.dry-run }}
      shell: bash
      run: |
        ARGS=()
        [ -n "$COMMIT" ]             && ARGS+=(--commit "$COMMIT")
        [ -n "$CHANNEL" ]            && ARGS+=(--channel "$CHANNEL")
        [ -n "$DIR" ]                && ARGS+=(--dir "$DIR")
        [ -n "$ARTIFACT" ]           && ARGS+=(--artifact "$ARTIFACT")
        [ "$SKIP_INSTALL" = "true" ] && ARGS+=(--skip-install)
        [ "$NOTIFY" = "true" ]       && ARGS+=(--notify true)
        [ "$DRY_RUN" = "true" ]      && ARGS+=(--dry-run)

        keet-automation \
          --seed "$SEED" \
          --remote "$REMOTE" \
          "$JOB" \
          "${ARGS[@]}" \
