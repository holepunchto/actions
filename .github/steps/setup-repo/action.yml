name: Setup Repo

runs:
  using: composite
  steps:
    - uses: holepunchto/actions/checkout@v1

    - name: Git config
      shell: bash
      run: |
        git config user.name 'GitHub Actions Bot'
        git config user.email 'bot@github.actions.com'

    - uses: holepunchto/actions/.github/steps/setup-repo@v1

    - name: Disable npm scripts
      shell: bash
      run: |
        npm config set foreground-scripts true
        npm config set ignore-scripts true
