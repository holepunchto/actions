name: Auto Review Request

on:
  workflow_call:

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files and request reviewers from CODEOWNERS
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/workflows/auto-review-request.js');
            await script({ github, context });
