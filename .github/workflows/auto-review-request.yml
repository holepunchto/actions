name: Auto Review Request

on:
  workflow_call:

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Request reviewers from CODEOWNERS
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const codeownersPath = '.github/CODEOWNERS';
            if (!fs.existsSync(codeownersPath)) {
              console.log('❌ No CODEOWNERS file found');
              return;
            }

            const content = fs.readFileSync(codeownersPath, 'utf8');
            console.log('📄 CODEOWNERS content:');
            console.log(content);

            const rules = content
              .split('\n')
              .map(line => line.trim())
              .filter(line => line && !line.startsWith('#'))
              .map(line => {
                const parts = line.split(/\s+/);
                return { pattern: parts[0], owners: parts.slice(1).map(o => o.replace(/^@/, '')) };
              })
              .filter(rule => rule.owners.length > 0);

            console.log(`📋 Parsed ${rules.length} rules:`, JSON.stringify(rules, null, 2));

            if (rules.length === 0) {
              console.log('❌ No rules found');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const changedFiles = files.map(f => f.filename);
            console.log(`📁 Changed files (${changedFiles.length}):`, changedFiles);

            const matchPattern = (pattern, filePath) => {
              // Special case: "/" or "/*" matches everything
              if (pattern === '/' || pattern === '/*') {
                return true;
              }
              if (pattern.endsWith('/')) {
                return filePath.startsWith(pattern) || filePath.startsWith(pattern.slice(0, -1) + '/');
              }
              let regex = pattern
                .replace(/\./g, '\\.')
                .replace(/\*\*/g, '{{GLOBSTAR}}')
                .replace(/\*/g, '[^/]*')
                .replace(/\{\{GLOBSTAR\}\}/g, '.*');
              regex = pattern.startsWith('/') ? '^' + regex.slice(1) : '(^|/)' + regex;
              regex += '$';
              try { return new RegExp(regex).test(filePath); }
              catch { return false; }
            };

            const matchedOwners = new Set();
            for (const file of changedFiles) {
              for (const rule of rules) {
                const matched = matchPattern(rule.pattern, file);
                console.log(`  ${matched ? '✅' : '❌'} "${file}" vs "${rule.pattern}"`);
                if (matched) {
                  rule.owners.forEach(o => matchedOwners.add(o));
                }
              }
            }

            console.log(`👥 Matched owners: ${[...matchedOwners].join(', ') || '(none)'}`);

            const prAuthor = context.payload.pull_request.user.login;
            console.log(`✍️  PR author: ${prAuthor}`);

            const reviewers = [...matchedOwners].filter(r => r !== prAuthor);
            console.log(`🔍 Reviewers after filtering author: ${reviewers.join(', ') || '(none)'}`);

            if (reviewers.length === 0) {
              console.log('⏭️  No reviewers to request (empty or all filtered)');
              return;
            }

            console.log(`📨 Requesting review from: ${reviewers.join(', ')}`);
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers
            });
            console.log('✅ Done!');
