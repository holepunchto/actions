name: 'Make Pear Apps'
description: 'Action for making Pear apps'

inputs:
  name:
    description: 'App name'
    required: true
  version:
    description: 'Version'
    required: true
  arch:
    description: 'Architecture'
    required: true
  channel:
    description: 'Channel name'
    required: true
  upgrade_key:
    description: 'Upgrade key'
    required: false
    default: ''
  macos_certificate_base64:
    description: 'Base64-encoded Apple distribution certificate (P12 format)'
    required: false
    default: ''
  macos_p12_password:
    description: 'Password for the P12 certificate'
    required: false
    default: ''
  macos_codesign_identity:
    description: 'Code signing identity used for macOS builds'
    required: false
    default: ''
  macos_notarization_method:
    description: 'Notarization method to use: appstore_connect or apple_id_password'
    required: false
    default: ''
  macos_apple_id:
    description: 'Apple ID email for notarization'
    required: false
    default: ''
  macos_apple_password:
    description: 'Apple app-specific password'
    required: false
    default: ''
  macos_apple_team_id:
    description: 'Apple Developer Team ID'
    required: false
    default: ''
  macos_api_key_base64:
    description: 'Base64-encoded App Store Connect API key (like AuthKey_ABCD123456.p8)'
    required: false
    default: ''
  macos_api_key_id:
    description: '10-character alphanumeric ID string of the App Store Connect (like ABCD123456)'
    required: false
    default: ''
  macos_api_issuer:
    description: 'UUID that identifies the API key issuer'
    required: false
    default: ''
  windows_signing_method:
    description: 'Signing method to use: windows_cert_sha1 or windows_cert_pfx'
    required: false
    default: ''
  windows_cert_sha1:
    description: 'SHA1 thumbprint of the Windows cert'
    required: false
    default: ''
  windows_cert_pfx_base64:
    description: 'Base64-encoded Windows cert pfx file'
    required: false
    default: ''
  windows_cert_password:
    description: 'Password for the Windows certificate'
    required: false
    default: ''
  linux_set_up_snapcraft:
    description: 'Set up Snapcraft'
    required: false
    default: 'true'

outputs:
  artifact-links:
    description: 'Links to uploaded artifacts'
    value: >-
      ${{
        runner.os == 'Linux' && format(
          '{0}\n{1}\n{2}',
          format('<{0}|{1}>', steps.upload-artifact-appimage.outputs.artifact-url, env.APPIMAGE_NAME),
          format('<{0}|{1}>', steps.upload-artifact-snap.outputs.artifact-url, env.SNAP_NAME),
          format('<{0}|{1}>', steps.upload-artifact-flatpak.outputs.artifact-url, env.FLATPAK_NAME)
        ) ||
        runner.os == 'Windows' && format(
          '{0}\n{1}',
          format('<{0}|{1}>', steps.upload-artifact-msix.outputs.artifact-url, env.MSIX_NAME),
          format('<{0}|{1}>', steps.upload-artifact-zip.outputs.artifact-url, env.ZIP_NAME)
        ) ||
        runner.os == 'macOS' && format(
          '<{0}|{1}>',
          steps.upload-artifact-dmg.outputs.artifact-url,
          env.DMG_NAME
        )
      }}

runs:
  using: composite
  steps:
    - name: 'Validate macOS inputs'
      if: ${{ runner.os == 'macOS' }}
      env:
        MACOS_CERTIFICATE_BASE64: ${{ inputs.macos_certificate_base64 }}
        MACOS_P12_PASSWORD: ${{ inputs.macos_p12_password }}
        MACOS_CODESIGN_IDENTITY: ${{ inputs.macos_codesign_identity }}
        MACOS_NOTARIZATION_METHOD: ${{ inputs.macos_notarization_method }}
        MACOS_API_KEY_BASE64: ${{ inputs.macos_api_key_base64 }}
        MACOS_API_KEY_ID: ${{ inputs.macos_api_key_id }}
        MACOS_API_ISSUER: ${{ inputs.macos_api_issuer }}
        MACOS_APPLE_ID: ${{ inputs.macos_apple_id }}
        MACOS_APPLE_PASSWORD: ${{ inputs.macos_apple_password }}
        MACOS_APPLE_TEAM_ID: ${{ inputs.macos_apple_team_id }}
      run: |
        MISSING=""

        # Always required for signing
        [ -z "$MACOS_CERTIFICATE_BASE64" ] && MISSING="$MISSING macos_certificate_base64"
        [ -z "$MACOS_P12_PASSWORD" ] && MISSING="$MISSING macos_p12_password"
        [ -z "$MACOS_CODESIGN_IDENTITY" ] && MISSING="$MISSING macos_codesign_identity"
        [ -z "$MACOS_NOTARIZATION_METHOD" ] && MISSING="$MISSING macos_notarization_method"

        # Validate notarization fields based on selected method
        case "$MACOS_NOTARIZATION_METHOD" in
          appstore_connect)
            [ -z "$MACOS_API_KEY_BASE64" ] && MISSING="$MISSING macos_api_key_base64"
            [ -z "$MACOS_API_KEY_ID" ] && MISSING="$MISSING macos_api_key_id"
            [ -z "$MACOS_API_ISSUER" ] && MISSING="$MISSING macos_api_issuer"
            ;;
          apple_id_password)
            [ -z "$MACOS_APPLE_ID" ] && MISSING="$MISSING macos_apple_id"
            [ -z "$MACOS_APPLE_PASSWORD" ] && MISSING="$MISSING macos_apple_password"
            [ -z "$MACOS_APPLE_TEAM_ID" ] && MISSING="$MISSING macos_apple_team_id"
            ;;
          *)
            INVALID_METHOD="true"
        esac

        if [ "$INVALID_METHOD" = "true" ]; then
          echo "Error: Invalid macos_notarization_method '$MACOS_NOTARIZATION_METHOD'. Must be 'appstore_connect' or 'apple_id_password'."
        fi

        # Fail if any required fields are missing or invalid
        if [ -n "$MISSING" ] || [ "$INVALID_METHOD" = "true" ]; then
          if [ -n "$MISSING" ]; then
            echo "Error: Missing macOS inputs: ${MISSING# }"
          fi
          exit 1
        fi
      shell: bash
    - name: 'Validate Windows inputs'
      if: ${{ runner.os == 'Windows' }}
      env:
        WINDOWS_SIGNING_METHOD: ${{ inputs.windows_signing_method }}
        WINDOWS_CERT_SHA1: ${{ inputs.windows_cert_sha1 }}
        WINDOWS_CERT_PFX_BASE64: ${{ inputs.windows_cert_pfx_base64 }}
        WINDOWS_CERT_PASSWORD: ${{ inputs.windows_cert_password }}
      run: |
        $missing = @()
        $invalidMethod = $false

        $method = $env:WINDOWS_SIGNING_METHOD

        if ([string]::IsNullOrEmpty($method)) {
          $missing += "windows_signing_method"
        }
        else {
          switch ($method) {
            "windows_cert_sha1" {
              if ([string]::IsNullOrEmpty($env:WINDOWS_CERT_SHA1)) {
                $missing += "windows_cert_sha1"
              }
            }
            "windows_cert_pfx" {
              if ([string]::IsNullOrEmpty($env:WINDOWS_CERT_PFX_BASE64)) {
                $missing += "windows_cert_pfx_base64"
              }
              if ([string]::IsNullOrEmpty($env:WINDOWS_CERT_PASSWORD)) {
                $missing += "windows_cert_password"
              }
            }
            default {
              $invalidMethod = $true
            }
          }
        }

        if ($invalidMethod) {
          Write-Error "Error: Invalid windows_signing_method '$method'. Must be 'windows_cert_sha1' or 'windows_cert_pfx'."
          exit 1
        }

        if ($missing.Count -gt 0) {
          Write-Error "Error: Missing Windows inputs: $($missing -join ', ')"
          exit 1
        }
      shell: pwsh
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 20
        registry-url: 'https://npm.pkg.github.com'
    - name: 'Install dependencies (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        npm ci
      shell: bash
    - name: 'Install dependencies (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        npm ci
      shell: pwsh
    - name: 'Install the Apple certificate and notarytool credentials'
      id: keychain_notary_setup
      if: ${{ runner.os == 'macOS' }}
      env:
        MACOS_CERTIFICATE_BASE64: ${{ inputs.macos_certificate_base64 }}
        MACOS_P12_PASSWORD: ${{ inputs.macos_p12_password }}
        MACOS_NOTARIZATION_METHOD: ${{ inputs.macos_notarization_method }}
        MACOS_API_KEY_BASE64: ${{ inputs.macos_api_key_base64 }}
        MACOS_API_KEY_ID: ${{ inputs.macos_api_key_id }}
        MACOS_API_ISSUER: ${{ inputs.macos_api_issuer }}
        MACOS_APPLE_ID: ${{ inputs.macos_apple_id }}
        MACOS_APPLE_PASSWORD: ${{ inputs.macos_apple_password }}
        MACOS_APPLE_TEAM_ID: ${{ inputs.macos_apple_team_id }}
      run: |
        # create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=keychain-password
        KEYCHAIN_PROFILE=notary

        # import certificate and API key from secrets
        echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "$MACOS_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # add notarytool credentials
        if [ "$MACOS_NOTARIZATION_METHOD" = "appstore_connect" ]; then
          APIKEY_PATH=$RUNNER_TEMP/AuthKey.p8

          echo -n "$MACOS_API_KEY_BASE64" | base64 --decode -o $APIKEY_PATH

          xcrun notarytool store-credentials "$KEYCHAIN_PROFILE" \
            --key "$APIKEY_PATH" \
            --key-id "$MACOS_API_KEY_ID" \
            --issuer "$MACOS_API_ISSUER" \
            --keychain "$KEYCHAIN_PATH"
        else
          xcrun notarytool store-credentials "$KEYCHAIN_PROFILE" \
            --apple-id "$MACOS_APPLE_ID" \
            --password "$MACOS_APPLE_PASSWORD" \
            --team-id "$MACOS_APPLE_TEAM_ID" \
            --keychain "$KEYCHAIN_PATH"
        fi

        echo "KEYCHAIN_PROFILE=$KEYCHAIN_PROFILE" >> $GITHUB_OUTPUT
      shell: bash
    - name: 'Install the Windows certificate'
      id: windows_certificate_setup
      if: ${{ runner.os == 'Windows' && inputs.windows_signing_method == 'windows_cert_pfx' }}
      env:
        WINDOWS_CERT_PFX_BASE64: ${{ inputs.windows_cert_pfx_base64 }}
        WINDOWS_CERT_PASSWORD: ${{ inputs.windows_cert_password }}
      run: |
        $certPath = "$env:RUNNER_TEMP\cert.pfx"
        [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))

        $importedCert = Import-PfxCertificate `
          -FilePath $certPath `
          -CertStoreLocation Cert:\CurrentUser\My `
          -Password (ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -Force -AsPlainText)

        echo "SHA1=$($importedCert.Thumbprint)" >> $env:GITHUB_OUTPUT
      shell: powershell
    - name: 'Set up Snapcraft'
      if: ${{ runner.os == 'Linux' && inputs.linux_set_up_snapcraft == 'true' }}
      run: |
        sudo snap install snapcraft --classic
        sudo snap install lxd
        sudo usermod -a -G lxd $USER
        groups $USER
        sudo iptables -P FORWARD ACCEPT
        sudo lxd init --auto
      shell: bash
    - name: 'Build application (Linux)'
      if: ${{ runner.os == 'Linux' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
        CHANNEL: '${{ inputs.channel }}'
        UPGRADE_KEY: "${{ inputs.upgrade_key != '' && inputs.upgrade_key || null }}"
        NODE_ENV: production
      run: |
        npm run make
      shell: bash
    - name: 'Build application (macOS)'
      if: ${{ runner.os == 'macOS' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
        CHANNEL: '${{ inputs.channel }}'
        UPGRADE_KEY: "${{ inputs.upgrade_key != '' && inputs.upgrade_key || null }}"
        MAC_CODESIGN_IDENTITY: '${{ inputs.macos_codesign_identity }}'
        KEYCHAIN_PROFILE: ${{ steps.keychain_notary_setup.outputs.KEYCHAIN_PROFILE }}
        NODE_ENV: production
      run: |
        npm run make
      shell: bash
    - name: 'Build application (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
        CHANNEL: '${{ inputs.channel }}'
        UPGRADE_KEY: "${{ inputs.upgrade_key != '' && inputs.upgrade_key || null }}"
        WINDOWS_CERT_SHA1: "${{ inputs.windows_signing_method == 'windows_cert_pfx' && steps.windows_certificate_setup.outputs.SHA1 || inputs.windows_cert_sha1 }}"
        WINDOWS_SIGN_HOOK: ${{ github.action_path }}/windows-sign.js
        NODE_ENV: production
      run: |
        npm run make
      shell: pwsh
    - id: upload-artifacts-appimage
      name: 'Upload appimage artifact'
      if: ${{ runner.os == 'Linux' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      env:
        APPIMAGE_NAME: >-
          ${{ format(
            '{0}{1}-{2}-{3}.AppImage',
            inputs.name,
            inputs.channel != 'production' && format('-{0}', inputs.channel) || '',
            inputs.version,
            inputs.arch
          ) }}
      with:
        name: ${{ env.APPIMAGE_NAME }}
        path: out/make/*.AppImage
    - id: upload-artifacts-snap
      name: 'Upload snap artifact'
      if: ${{ runner.os == 'Linux' && inputs.linux_set_up_snapcraft == 'true' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      env:
        SNAP_NAME: >-
          ${{ format(
            '{0}{1}_{2}_{3}.snap',
            inputs.name,
            inputs.channel != 'production' && format('_{0}', inputs.channel) || '',
            inputs.version,
            inputs.arch == 'x64' && 'amd64' || 'arm64'
          ) }}
      with:
        name: ${{ env.SNAP_NAME }}
        path: out/make/*.snap
    - id: upload-artifacts-flatpak
      name: 'Upload flatpak artifact'
      if: ${{ runner.os == 'Linux' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      env:
        FLATPAK_NAME: >-
          ${{ format(
            '{0}{1}_{2}_{3}_flatpak.tar.gz',
            inputs.name,
            inputs.channel != 'production' && format('_{0}', inputs.channel) || '',
            inputs.version,
            inputs.arch
          ) }}
      with:
        name: ${{ env.FLATPAK_NAME }}
        path: out/make/*_flatpak.tar.gz
    - id: upload-artifacts-dmg
      name: 'Upload DMG artifact'
      if: ${{ runner.os == 'macOS' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      env:
        DMG_NAME: >-
          ${{ format(
            '{0}{1}-{2}-{3}.dmg',
            inputs.name,
            inputs.channel != 'production' && format('-{0}', inputs.channel) || '',
            inputs.version,
            inputs.arch
          ) }}
      with:
        name: ${{ env.DMG_NAME }}
        path: out/make/*.dmg
    - id: upload-artifacts-msix
      name: 'Upload MSIX artifact'
      if: ${{ runner.os == 'Windows' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      env:
        MSIX_NAME: >-
          ${{ format(
            '{0}{1}-{2}-{3}.msix',
            inputs.name,
            inputs.channel != 'production' && format('-{0}', inputs.channel) || '',
            inputs.version,
            inputs.arch
          ) }}
      with:
        name: ${{ env.MSIX_NAME }}
        path: out/make/*.msix
    - id: upload-artifacts-zip
      name: 'Upload MSIX artifact'
      if: ${{ runner.os == 'Windows' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      env:
        ZIP_NAME: >-
          ${{ format(
            '{0}{1}-{2}-{3}.zip',
            inputs.name,
            inputs.channel != 'production' && format('-{0}', inputs.channel) || '',
            inputs.version,
            inputs.arch
          ) }}
      with:
        name: ${{ env.ZIP_NAME }}
        path: out/make/*.zip
