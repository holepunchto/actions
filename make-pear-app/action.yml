name: 'Make Pear Apps'
description: 'Action for making Pear apps'

inputs:
  channel:
    description: 'Channel name'
    required: true
  upgrade_key:
    description: 'Upgrade key'
    required: false
    default: ''
  macos_certificate_base64:
    description: 'Base64-encoded Apple distribution certificate (P12 format)'
    required: false
    default: ''
  macos_p12_password:
    description: 'Password for the P12 certificate'
    required: false
    default: ''
  macos_codesign_identity:
    description: 'Code signing identity used for macOS builds'
    required: false
    default: ''
  macos_notarization_method:
    description: 'Notarization method to use: appstore_connect or apple_id_password'
    required: false
    default: ''
  macos_apple_id:
    description: 'Apple ID email for notarization'
    required: false
    default: ''
  macos_apple_password:
    description: 'Apple app-specific password'
    required: false
    default: ''
  macos_apple_team_id:
    description: 'Apple Developer Team ID'
    required: false
    default: ''
  macos_api_key_base64:
    description: 'Base64-encoded App Store Connect API key (like AuthKey_ABCD123456.p8)'
    required: false
    default: ''
  macos_api_key_id:
    description: '10-character alphanumeric ID string of the App Store Connect (like ABCD123456)'
    required: false
    default: ''
  macos_api_issuer:
    description: 'UUID that identifies the API key issuer'
    required: false
    default: ''

outputs:
  artifact-links:
    description: 'Links to uploaded artifacts'
    value: ${{ steps.upload-artifacts-bash.outputs.artifact-links || steps.upload-artifacts-pwsh.outputs.artifact-links }}

runs:
  using: composite
  steps:
    - name: 'Validate macOS inputs'
      if: ${{ runner.os == 'macOS' }}
      run: |
        MISSING=""

        # Always required for signing
        [ -z "${{ inputs.macos_certificate_base64 }}" ] && MISSING="$MISSING macos_certificate_base64"
        [ -z "${{ inputs.macos_p12_password }}" ] && MISSING="$MISSING macos_p12_password"
        [ -z "${{ inputs.macos_codesign_identity }}" ] && MISSING="$MISSING macos_codesign_identity"
        [ -z "${{ inputs.macos_notarization_method }}" ] && MISSING="$MISSING macos_notarization_method"

        # Validate notarization fields based on selected method
        case "${{ inputs.macos_notarization_method }}" in
          appstore_connect)
            [ -z "${{ inputs.macos_api_key_base64 }}" ] && MISSING="$MISSING macos_api_key_base64"
            [ -z "${{ inputs.macos_api_key_id }}" ] && MISSING="$MISSING macos_api_key_id"
            [ -z "${{ inputs.macos_api_issuer }}" ] && MISSING="$MISSING macos_api_issuer"
            ;;
          apple_id_password)
            [ -z "${{ inputs.macos_apple_id }}" ] && MISSING="$MISSING macos_apple_id"
            [ -z "${{ inputs.macos_apple_password }}" ] && MISSING="$MISSING macos_apple_password"
            [ -z "${{ inputs.macos_apple_team_id }}" ] && MISSING="$MISSING macos_apple_team_id"
            ;;
          *)
            INVALID_METHOD="true"
        esac

        if [ "$INVALID_METHOD" = "true" ]; then
          echo "Error: Invalid macos_notarization_method '${{ inputs.macos_notarization_method }}'. Must be 'appstore_connect' or 'apple_id_password'."
        fi

        # Fail if any required fields are missing or invalid
        if [ -n "$MISSING" ] || [ "$INVALID_METHOD" = "true" ]; then
          if [ -n "$MISSING" ]; then
            echo "Error: Missing macOS inputs: ${MISSING# }"
          fi
          exit 1
        fi
      shell: bash
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 20
        registry-url: 'https://npm.pkg.github.com'
    - name: 'Install dependencies (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        npm install
      shell: bash
    - name: 'Install dependencies (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      run: |
        npm install
      shell: pwsh
    - name: 'Install the Apple certificate and notarytool credentials'
      id: keychain_notary_setup
      if: ${{ runner.os == 'macOS' }}
      run: |
        # create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=keychain-password
        KEYCHAIN_PROFILE=notary

        # import certificate and API key from secrets
        echo -n "${{ inputs.macos_certificate_base64 }}" | base64 --decode -o $CERTIFICATE_PATH
        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "${{ inputs.macos_p12_password }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # add notarytool credentials
        if [ "${{ inputs.macos_notarization_method }}" = "appstore_connect" ]; then
          APIKEY_PATH=$RUNNER_TEMP/AuthKey.p8

          echo -n "${{ inputs.macos_api_key_base64 }}" | base64 --decode -o $APIKEY_PATH

          xcrun notarytool store-credentials "$KEYCHAIN_PROFILE" \
            --key "$APIKEY_PATH" \
            --key-id "${{ inputs.macos_api_key_id }}" \
            --issuer "${{ inputs.macos_api_issuer }}" \
            --keychain "$KEYCHAIN_PATH"
        else
          xcrun notarytool store-credentials "$KEYCHAIN_PROFILE" \
            --apple-id "${{ inputs.macos_apple_id }}" \
            --password "${{ inputs.macos_apple_password }}" \
            --team-id "${{ inputs.macos_apple_team_id }}" \
            --keychain "$KEYCHAIN_PATH"
        fi

        echo "KEYCHAIN_PROFILE=$KEYCHAIN_PROFILE" >> $GITHUB_OUTPUT
      shell: bash
    - name: 'Build application (Linux)'
      if: ${{ runner.os == 'Linux' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
        CHANNEL: "${{ inputs.channel }}"
        UPGRADE_KEY: "${{ inputs.upgrade_key != '' && inputs.upgrade_key || null }}"
        NODE_ENV: production
      run: |
        npm run make
      shell: bash
    - name: 'Build application (macOS)'
      if: ${{ runner.os == 'macOS' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
        CHANNEL: "${{ inputs.channel }}"
        UPGRADE_KEY: "${{ inputs.upgrade_key != '' && inputs.upgrade_key || null }}"
        MAC_CODESIGN_IDENTITY: "${{ inputs.macos_codesign_identity }}"
        KEYCHAIN_PROFILE: ${{ steps.keychain_notary_setup.outputs.KEYCHAIN_PROFILE }}
        NODE_ENV: production
      run: |
        npm run make
      shell: bash
    - name: 'Build application (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
        CHANNEL: "${{ inputs.channel }}"
        UPGRADE_KEY: "${{ inputs.upgrade_key != '' && inputs.upgrade_key || null }}"
        NODE_ENV: production
      run: |
        npm run make
      shell: pwsh
    - name: 'Install @actions/artifact module (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      run: |
        npm install @actions/artifact@2.3.2 --global
        echo "NODE_PATH=$(npm root --quiet -g)" >> $GITHUB_ENV
      shell: bash
    - name: 'Install @actions/artifact module (Windows)'
      if: ${{ runner.os == 'Windows' }}
      run: |
        npm install @actions/artifact@2.3.2 --global
        $npmRoot = npm root --quiet -g
        Add-Content -Path $env:GITHUB_ENV -Value "NODE_PATH=$npmRoot"
      shell: pwsh
    - name: 'Extract Actions runtime variables'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
          core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])
    - id: upload-artifacts-bash
      name: 'Upload folders as artifacts (Linux/macOS)'
      if: ${{ runner.os != 'Windows' }}
      env:
        NODE_PATH: "${{ env.NODE_PATH }}"
      run: node ${{ github.action_path }}/upload-artifacts.cjs
      shell: bash
    - id: upload-artifacts-pwsh
      name: 'Upload folders as artifacts (Windows)'
      if: ${{ runner.os == 'Windows' }}
      env:
        NODE_PATH: "${{ env.NODE_PATH }}"
      run: node ${{ github.action_path }}/upload-artifacts.cjs
      shell: pwsh
