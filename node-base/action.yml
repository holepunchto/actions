name: Node.js base
description: Configure a Node.js project

inputs:
  allow-git:
    description: Allow git dependencies
    default: none
    type: string

runs:
  using: composite
  steps:
    - uses: holepunchto/actions/checkout@v1
    - uses: holepunchto/actions/setup-node@v1
    - run: npm install --ignore-scripts --foreground-scripts --allow-git=${{ inputs.allow-git }}
      env:
        NODE_AUTH_TOKEN: ${{ github.token }}
      shell: bash
