name: Setup Node.js
description: Install and configure Node.js LTS

inputs:
  registry-url:
    description: npm registry URL to configure for auth
    default: https://registry.npmjs.org
  scope:
    description: Optional scope for scoped registries (e.g. @myorg)
  always-auth:
    description: Set always-auth in .npmrc
    default: false

runs:
  using: composite
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: lts/*
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
        always-auth: ${{ inputs.always-auth }}
