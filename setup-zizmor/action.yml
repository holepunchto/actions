name: Setup zizmor
description: Run zizmor static analysis on current repository

inputs:
  advanced-security:
    description: Upload results to GitHub Advanced Security
    default: false
  config:
    description: Path to a zizmor configuration file
    default: ./config.yml

runs:
  using: composite
  steps:
    - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
      with:
        advanced-security: ${{ inputs.advanced-security }}
        version: 1.25.2
        config: ${{ inputs.config }}
